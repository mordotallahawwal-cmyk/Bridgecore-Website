<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridgecore - Customer Experience & Complaint Management</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0B0F19] text-white antialiased">

    <!-- NAVIGATION HEADER -->
    <header class="w-full flex items-center justify-between px-6 py-6 max-w-7xl mx-auto">
        <div class="text-xl font-bold">Bridgecore</div>

        <!-- Desktop Menu -->
        <nav class="hidden md:flex bg-gray-800/50 border border-gray-700 rounded-full px-6 py-2 items-center space-x-6 text-xs font-semibold text-gray-300">
            <a href="#impact" class="hover:text-white">Impact</a>
            <a href="#services" class="hover:text-white">Services</a>
            <a href="#process" class="hover:text-white">Process</a>
            <a href="#founder" class="hover:text-white">Founder</a>
            <a href="#pricing" class="hover:text-white">Pricing</a>
            <a href="#contact" class="hover:text-white">Contact</a>
        </nav>

        <!-- CTA Button -->
        <a href="#contact" class="hidden md:block bg-[#F25C22] hover:bg-[#e0501a] text-white px-5 py-2 rounded-full text-xs font-bold uppercase transition">
            Work With Us
        </a>

        <!-- Mobile Menu Toggle -->
        <button id="menu-toggle" class="md:hidden p-2 text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </header>

    <!-- Mobile Navigation Drawer -->
    <div id="mobile-menu" class="hidden md:hidden bg-gray-900 border-b border-gray-800 p-6 flex flex-col space-y-4">
        <a href="#impact" class="text-sm">Impact</a>
        <a href="#services" class="text-sm">Services</a>
        <a href="#contact" class="text-sm">Contact</a>
        <a href="#contact" class="bg-[#F25C22] text-center py-2 rounded-full text-xs font-bold uppercase">Work With Us</a>
    </div>

    <!-- HERO SECTION -->
    <main class="max-w-7xl mx-auto px-6 py-20">
        <h1 class="text-5xl md:text-7xl font-extrabold leading-tight">
            We Don't Just Respond, <span class="text-[#00B2D6]">We Resolve.</span>
        </h1>
        <p class="mt-6 text-gray-400 max-w-xl text-lg">
            Bridgecore Solution helps businesses retain more customers, resolve complaints faster, and increase revenue — managed professionally on your behalf.
        </p>
    </main>

    <!-- SECTOR SOLUTIONS PLACEHOLDER -->
    <section id="services" class="max-w-7xl mx-auto px-6 py-16">
        <div class="grid md:grid-cols-3 gap-8">
            <!-- These placeholders are ready for your incoming sector content -->
            <div class="bg-gray-800/30 p-8 rounded-2xl border border-gray-800 min-h-[200px]"></div>
            <div class="bg-gray-800/30 p-8 rounded-2xl border border-gray-800 min-h-[200px]"></div>
            <div class="bg-gray-800/30 p-8 rounded-2xl border border-gray-800 min-h-[200px]"></div>
        </div>
    </section>

    <!-- MOBILE MENU SCRIPT -->
    <script>
        document.getElementById('menu-toggle').onclick = function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        };
    </script>
</body>
</html>
